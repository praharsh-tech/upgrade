<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HOD Dashboard | NIT Polytechnic</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
*{
transition: all 0.2s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.animate-fadeIn{
animation:fadeIn 0.5s ease;
}
</style>

</head>

<body class="bg-slate-100 min-h-screen flex">

<!-- ================= SIDEBAR ================= -->

<aside class="w-64 bg-gradient-to-b from-blue-700 to-indigo-700 text-white min-h-screen p-6 space-y-6">

<h1 class="text-2xl font-bold">HOD Panel</h1>

<nav class="space-y-3">

<button id="navDashboard"
class="w-full text-left p-3 rounded-lg transition-all duration-200 hover:bg-blue-600 hover:pl-4 hover:shadow-md">

🏠 Dashboard

</button>

<button id="navPrincipalTasks" class="w-full text-left hover:bg-blue-600 p-2 rounded">
📥 Tasks From Principal
</button>

<button id="navFacultyTasks" class="w-full text-left hover:bg-blue-600 p-2 rounded">
📤 Tasks Assigned To Faculty
</button>

<button id="navAssignTask" class="w-full text-left hover:bg-blue-600 p-2 rounded">
➕ Assign Task
</button>

</nav>

</aside>

<!-- ================= MAIN ================= -->

<div class="flex-1 flex flex-col">

<!-- ================= HEADER ================= -->

<header class="bg-white shadow px-8 py-4 flex justify-between items-center">

<div>
<h2 class="text-xl font-bold text-blue-700">HOD Dashboard</h2>
<p id="hodHeaderInfo" class="text-sm text-gray-500"></p>
</div>

<button
id="logoutBtn"
class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
Logout
</button>

</header>

<!-- ================= CONTENT ================= -->

<main class="p-6 space-y-8">

<!-- ================= HOD PROFILE ================= -->

<section class="bg-white rounded-xl shadow p-6 flex items-center gap-6 max-w-2xl animate-fadeIn">

<img
id="hodImage"
src="https://i.pravatar.cc/150"
class="w-24 h-24 rounded-full object-cover border transition-transform duration-300 hover:scale-110"
/>

<div>

<h2 id="hodFullName" class="text-xl font-semibold text-blue-700"></h2>

<p id="hodDept"
class="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded w-fit mt-1"></p>

<p id="hodEmail" class="text-gray-600 text-sm mt-1"></p>

<p id="hodPhone" class="text-gray-600 text-sm"></p>

</div>

</section>

<!-- ================= DASHBOARD ================= -->

<section id="dashboardSection" class="animate-fadeIn">

    <div class="grid md:grid-cols-6 gap-6">
    
    <div class="bg-white p-6 rounded-xl shadow transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 hover:scale-[1.02] cursor-pointer">
    <p class="text-gray-500 text-sm">Total Tasks</p>
    <h3 id="totalTasks" class="text-3xl font-bold text-blue-700">0</h3>
    </div>
    
    <div class="bg-white p-6 rounded-xl shadow transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 hover:scale-[1.02] cursor-pointer">
    <p class="text-gray-500 text-sm">Completed</p>
    <h3 id="completedTasks" class="text-3xl font-bold text-green-600">0</h3>
    </div>
    
    <div class="bg-white p-6 rounded-xl shadow transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 hover:scale-[1.02] cursor-pointer">
    <p class="text-gray-500 text-sm">Processing</p>
    <h3 id="processingTasks" class="text-3xl font-bold text-yellow-500">0</h3>
    </div>
    
<div class="bg-white p-6 rounded-xl shadow transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 hover:scale-[1.02] cursor-pointer">
    <p class="text-gray-500 text-sm">Pending</p>
    <h3 id="pendingTasks" class="text-3xl font-bold text-orange-500">0</h3>
    </div>
    
   <div class="bg-white p-6 rounded-xl shadow transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 hover:scale-[1.02] cursor-pointer">
    <p class="text-gray-500 text-sm">Late</p>
    <h3 id="lateTasks" class="text-3xl font-bold text-red-600">0</h3>
    </div>

   <div class="bg-white p-6 rounded-xl shadow transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 hover:scale-[1.02] cursor-pointer">
    <p class="text-gray-500 text-sm">failed</p>
    <h3 id="failedTasks" class="text-3xl font-bold text-red-700">0</h3>
    </div>
    
    </div>
    
    </section>

<!-- ================= TASKS FROM PRINCIPAL ================= -->

<section id="principalTasksSection" class="hidden animate-fadeIn">

<h2 class="text-xl font-semibold text-blue-700 mb-4">
Tasks Assigned By Principal
</h2>

<div id="hodTasks" class="grid md:grid-cols-2 gap-4">
    <p class="text-sm">
<strong>Deadline:</strong> ${task.deadline}
</p>

<p class="text-sm text-gray-500 timer"
data-deadline="${task.deadline}"
data-id="${task.id}">
Loading timer...
</p>
</div>

</section>

<!-- ================= TASKS ASSIGNED TO FACULTY ================= -->

<section id="facultyTasksSection" class="hidden animate-fadeIn">

<h2 class="text-xl font-semibold text-blue-700 mb-4">
Tasks Assigned To Faculty
</h2>

<div id="facultyAssignedTasks" class="grid md:grid-cols-2 gap-4"></div>

</section>

<!-- ================= ASSIGN TASK ================= -->

<section
id="assignTaskSection"
class="hidden bg-white shadow-xl rounded-xl p-6 max-w-3xl animate-fadeIn">

<h2 class="text-xl font-bold mb-4">
Assign Task to Faculty
</h2>

<form id="assignTaskForm" class="space-y-4">

<div>
<label class="text-sm font-semibold">Select Faculty</label>

<select id="assignToSelect" class="border w-full p-2 rounded">
<option value="">Select Faculty</option>
</select>
</div>

<div>
<label class="text-sm font-semibold">Task Title</label>

<input
id="taskTitle"
type="text"
class="border w-full p-2 rounded"
/>
</div>

<div>
<label class="text-sm font-semibold">Description</label>

<textarea
id="taskDesc"
rows="4"
class="border w-full p-2 rounded"></textarea>
</div>

<div>
<label class="text-sm font-semibold">Deadline</label>

<input
id="taskDeadline"
type="datetime-local"
class="border w-full p-2 rounded"
/>

<div>
<label class="text-sm font-semibold">Upload File</label>

<input
type="file"
id="taskFile"
class="border w-full p-2 rounded"
/>
</div>

<div class="flex justify-end gap-3">

<button
type="button"
id="cancelAssign"
class="bg-gray-400 text-white px-4 py-2 rounded">
Cancel
</button>

<button
type="submit"
class="bg-blue-600 text-white px-5 py-2 rounded-lg shadow transition-all duration-200 hover:bg-blue-700 hover:scale-105 hover:shadow-lg">
Assign Task
</button>

</div>

</form>

</section>

</main>

</div>

<!-- ================= NAVIGATION SCRIPT ================= -->

<script>

function showSection(section){

const sections=[
"dashboardSection",
"principalTasksSection",
"facultyTasksSection",
"assignTaskSection"
];

sections.forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(section).classList.remove("hidden");

}

document.getElementById("navDashboard").onclick =
()=>showSection("dashboardSection");

document.getElementById("navPrincipalTasks").onclick =
()=>showSection("principalTasksSection");

document.getElementById("navFacultyTasks").onclick =
()=>showSection("facultyTasksSection");

document.getElementById("navAssignTask").onclick =
()=>showSection("assignTaskSection");

</script>

<script type="module" src="hod.js"></script>

</body>
</html>
