<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIT Polytechnic Nagpur | Login</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen flex items-center justify-center bg-cover bg-center"
style="background-image: url('./images/backgroundimage.jpeg');">

<!-- MAIN CONTAINER -->
<div class="w-full max-w-6xl bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl overflow-hidden grid grid-cols-1 md:grid-cols-2">

<!-- LEFT SECTION -->
<div class="hidden md:flex flex-col justify-center p-10 bg-gradient-to-br from-blue-700 to-indigo-700 text-white">

<h1 class="text-3xl font-bold mb-4">
College Task Management System
</h1>

<img 
src="./images/WhatsApp Image 2026-03-15 at 11.29.26.jpeg"
alt="Students"
class="rounded-lg shadow-lg mb-6 w-full object-cover"
/>

<p class="text-sm leading-relaxed opacity-90">
NIT Polytechnic, Nagpur is a well-known diploma engineering institute
offering quality technical education with practical exposure and
industry-oriented learning.
</p>

<p class="mt-8 text-xs opacity-70">
© 2026 NIT Polytechnic, Nagpur
</p>

</div>

<!-- RIGHT SECTION -->
<div class="p-8 md:p-12 flex flex-col justify-center">

<h2 class="text-2xl font-bold text-gray-800 mb-2">
Login to Dashboard
</h2>

<p class="text-sm text-gray-500 mb-6">
Enter your credentials to continue
</p>

<form id="loginForm" class="space-y-4">

<!-- ROLE -->
<div>
<label class="text-sm font-medium text-gray-600">Login As</label>
<select id="role"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">

<option value="">-- Select Role --</option>
<option value="principal">Principal</option>
<option value="hod">HOD</option>
<option value="faculty">Faculty</option>
<option value="scholarship">Scholarship Section</option>
<option value="accounts">Accounts Section</option>

</select>
</div>

<!-- USERNAME -->
<div>
<label class="text-sm font-medium text-gray-600">Username</label>
<input id="username" type="text"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
placeholder="Enter username">
</div>

<!-- PASSWORD -->
<div>
<label class="text-sm font-medium text-gray-600">Password</label>
<input id="password" type="password"
class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
placeholder="Enter password">
</div>

<button
type="submit"
class="w-full bg-blue-700 text-white py-2 rounded-lg font-semibold hover:bg-blue-800 transition">

Login

</button>

</form>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
