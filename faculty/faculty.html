<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Faculty Dashboard | NIT Polytechnic</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex min-h-screen">

<!-- ================= SIDEBAR ================= -->

<aside class="w-64 bg-gradient-to-b from-indigo-700 to-blue-700 text-white p-6 space-y-6">

<h2 class="text-2xl font-bold">Faculty Panel</h2>

<nav class="space-y-3">

<button id="navDashboard" class="w-full text-left hover:bg-indigo-600 p-2 rounded">
🏠 Dashboard
</button>

<button id="navTasks" class="w-full text-left hover:bg-indigo-600 p-2 rounded">
📥 Tasks From HOD
</button>

</nav>

<button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded w-full mt-10">
Logout
</button>

</aside>

<!-- ================= MAIN ================= -->

<div class="flex-1 flex flex-col">

<!-- HEADER -->

<header class="bg-white shadow px-8 py-4 flex justify-between">

<h1 class="text-xl font-bold text-indigo-700">Faculty Dashboard</h1>

<p id="facultyHeader" class="text-gray-600"></p>

</header>

<!-- CONTENT -->

<main class="p-8 space-y-10">

<!-- ================= DASHBOARD ================= -->

<section id="dashboardSection">

<h2 class="text-2xl font-semibold mb-6 text-indigo-700">
Dashboard Overview
</h2>

<div class="grid md:grid-cols-3 gap-6">

<div class="bg-white shadow rounded-xl p-6">
<p class="text-gray-500">Total Tasks</p>
<h3 id="totalTasks" class="text-3xl font-bold">0</h3>
</div>

<div class="bg-white shadow rounded-xl p-6">
<p class="text-gray-500">Completed</p>
<h3 id="completedTasks" class="text-3xl font-bold text-green-600">0</h3>
</div>

<div class="bg-white shadow rounded-xl p-6">
<p class="text-gray-500">Pending</p>
<h3 id="pendingTasks" class="text-3xl font-bold text-orange-500">0</h3>
</div>

</div>

</section>

<!-- ================= PROFILE ================= -->

<section class="bg-white rounded-xl shadow p-6 flex gap-6 items-center">

<img
id="facultyImage"
src="https://via.placeholder.com/120"
class="w-28 h-28 rounded-xl object-cover border"
/>

<div>

<h2 id="facultyName" class="text-2xl font-semibold"></h2>

<p id="facultyDept" class="text-gray-600"></p>

<p id="facultyEmail" class="text-gray-600"></p>

<p id="facultyPhone" class="text-gray-600"></p>

</div>

</section>

<!-- ================= TASKS ================= -->

<section id="tasksSection" class="hidden">

<h2 class="text-2xl font-semibold text-indigo-700 mb-4">
Tasks Assigned by HOD
</h2>

<div id="facultyTasks" class="grid md:grid-cols-2 gap-4"></div>

</section>

</main>

</div>

<!-- ================= NAVIGATION SCRIPT ================= -->

<script>

function showSection(section){

const sections=[
"dashboardSection",
"tasksSection"
];

sections.forEach(id=>{
document.getElementById(id).classList.add("hidden");
});

document.getElementById(section).classList.remove("hidden");

}

document.getElementById("navDashboard").onclick =
()=>showSection("dashboardSection");

document.getElementById("navTasks").onclick =
()=>showSection("tasksSection");

</script>

<script type="module" src="./faculty.js"></script>

</body>
</html>
